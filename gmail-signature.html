<!--
  OxyScale Gmail Signature
  ========================

  HOW TO SET UP IN GMAIL:

  1. Open this file in your web browser (double-click it or drag into Chrome)
  2. Press Cmd+A (Mac) or Ctrl+A (Windows) to select everything on the page
  3. Press Cmd+C (Mac) or Ctrl+C (Windows) to copy
  4. Go to Gmail > Settings (gear icon) > See all settings
  5. Scroll down to the "Signature" section
  6. Click "+ Create new" if you don't have one, or edit your existing signature
  7. Click inside the signature editor box
  8. Press Cmd+V (Mac) or Ctrl+V (Windows) to paste
  9. Scroll down and click "Save Changes"

  NOTE: Gmail strips some CSS, so this signature uses only basic
  inline styles and table layouts for maximum compatibility.
-->
